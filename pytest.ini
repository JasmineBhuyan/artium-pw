[pytest]
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

testpaths  = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*

markers =
    login:      Login tests
    book_trial: Book-a-Trial flow tests
    smoke:      Quick sanity tests
    regression: Full regression run
